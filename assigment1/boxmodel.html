<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model</title>
    <style>
        .box {
            width: 200px;
            height: 200px;
            background-color: rgb(20, 147, 56);
            border: 2px solid black;
            padding: 20px;
            margin: 30px;
        }
        .innerbox {
            width: 200px;
            height: 200px;
            background-color: lightcoral;
            margin: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <div class="innerbox">
                <p>This is the content area of the box. It has a width of 100px and a height of 200px.</p>

            </div>
        </div>
    </div>

</body>
